<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TTK Premium System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --glass: rgba(22, 27, 34, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #e6edf3; 
            --accent: #58a6ff; 
            --accent-glow: rgba(88, 166, 255, 0.4);
            --secondary: #8b949e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        input, .allow-select { user-select: text !important; -webkit-user-select: text !important; }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            min-height: 100vh; display: flex; justify-content: center;
        }

        /* Фон */
        .bg-glow { position: fixed; width: 400px; height: 400px; background: var(--accent); filter: blur(140px); opacity: 0.1; z-index: -1; border-radius: 50%; top: -150px; right: -150px; }

        .container { width: 100%; max-width: 500px; padding: 20px; z-index: 1; }

        .glass-card { 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); border-radius: 28px; padding: 25px; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.5); 
        }

        h2, h3 { font-weight: 700; margin-bottom: 20px; text-align: center; letter-spacing: -0.5px; }

        input { 
            background: rgba(0, 0, 0, 0.4); border: 1px solid var(--glass-border); border-radius: 18px; 
            color: #fff; padding: 18px; width: 100%; margin-bottom: 16px; font-size: 16px; text-align: center; outline: none; transition: 0.3s; 
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        .btn-main { 
            background: var(--accent); color: #fff; border: none; border-radius: 18px; padding: 18px; 
            font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; box-shadow: 0 5px 15px rgba(88, 166, 255, 0.2); 
        }

        /* Меню */
        .menu-grid { display: grid; gap: 14px; margin-top: 10px; }
        .card-item { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); 
            padding: 20px; border-radius: 22px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; 
        }
        .card-item:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.97); }
        .card-item i { margin-right: 15px; font-style: normal; font-size: 22px; }
        .special-item { background: linear-gradient(135deg, rgba(88,166,255,0.15), rgba(88,166,255,0.05)); border-color: rgba(88,166,255,0.3); }

        /* Кнопка в углу */
        .fab { 
            position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent); 
            border-radius: 20px; display: none; align-items: center; justify-content: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 1000; cursor: pointer; border: none; color: white; font-size: 28px; 
        }

        /* КОНТЕНТ (АБЗАЦЫ) */
        #doc-view { display: none; width: 100%; max-width: 750px; padding: 20px 20px 120px 20px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        #doc-data { color: #d1d5db; line-height: 1.8; font-size: 16px; }
        #doc-data p { margin-bottom: 24px; display: block; } /* Разделение абзацев */
        #doc-data table { width: 100%; border-collapse: collapse; margin: 25px 0; background: rgba(0,0,0,0.4); border-radius: 14px; overflow: hidden; }
        #doc-data td { border: 1px solid var(--glass-border); padding: 14px; font-size: 14px; }
        
        #my-id { margin-top: 35px; font-size: 11px; color: var(--secondary); letter-spacing: 2px; cursor: pointer; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="bg-glow"></div>

    <div id="screen-login" class="container">
        <div class="glass-card" style="margin-top: 70px;">
            <h2>Доступ</h2>
            <input type="text" id="pass-input" placeholder="Введите ключ">
            <button class="btn-main" onclick="checkAccess()">Открыть</button>
            <div id="my-id" onclick="copyID()">Определение ID...</div>
        </div>
    </div>

    <div id="screen-menu" class="container" style="display: none;">
        <h3 style="text-align: left; margin-bottom: 25px; padding-left: 10px;">Материалы</h3>
        <div class="menu-grid">
            <div class="card-item special-item" onclick="openDoc('вопросы.docx', 'Инструкция')">
                <i>📖</i> <span>Общие обязанности оператора</span>
            </div>
            <div id="tickets-container" class="menu-grid"></div>
        </div>
    </div>

    <div id="screen-doc">
        <div id="doc-view">
            <h3 id="doc-header" style="text-align: left; color: var(--accent); margin-bottom: 25px;"></h3>
            <div id="doc-data" class="allow-select glass-card"></div>
        </div>
        <button class="fab" id="fab-back" onclick="showMenu()">←</button>
    </div>

    <script>
        const SECRET = "TTK_PRO_2026";
        
        // 1. ПОЛУЧЕНИЕ УНИКАЛЬНОГО ID
        function getID() {
            let id = localStorage.getItem('ttk_v4_id');
            if (!id) {
                // Генерация уникального ID для каждого устройства
                id = `TTK-${Math.random().toString(36).substring(2, 8).toUpperCase()}`;
                localStorage.setItem('ttk_v4_id', id);
            }
            return id;
        }
        const devID = getID();

        // 2. ГЕНЕРАЦИЯ МЕНЮ
        const wrap = document.getElementById('tickets-container');
        for (let i = 1; i <= 11; i++) {
            wrap.innerHTML += `
                <div class="card-item" onclick="openDoc('билет№${i}.docx', 'Экзамен: Билет №${i}')">
                    <i>🎫</i> <span>Билет №${i}</span>
                </div>`;
        }

        // 3. ФУНКЦИИ
        async function copyID() {
            try { await navigator.clipboard.writeText(devID); } 
            catch {
                const t = document.createElement("textarea"); t.value = devID;
                document.body.appendChild(t); t.select(); document.execCommand('copy');
                document.body.removeChild(t);
            }
            const el = document.getElementById('my-id');
            el.innerText = "ID СКОПИРОВАН";
            setTimeout(() => { el.innerText = "ID: " + devID; }, 1000);
        }

        function validate(pass) {
            try {
                const t = parseInt(pass.substring(0, 8), 16) * 1000;
                const h = btoa(devID + t + SECRET).substring(0, 6).toUpperCase();
                return (pass.substring(8) === h && Date.now() < t);
            } catch { return false; }
        }

        function checkAccess() {
            const val = document.getElementById('pass-input').value.trim().toUpperCase();
            if (validate(val)) { localStorage.setItem('ttk_token', val); showMenu(); }
            else { alert("Ключ неверен"); }
        }

        function showMenu() {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('doc-view').style.display = 'none';
            document.getElementById('fab-back').style.display = 'none';
            document.getElementById('screen-menu').style.display = 'block';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function openDoc(file, title) {
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('doc-view').style.display = 'block';
            document.getElementById('fab-back').style.display = 'flex';
            document.getElementById('doc-header').innerText = title;
            const content = document.getElementById('doc-data');
            content.innerHTML = "Чтение документа...";

            try {
                const r = await fetch(file + "?v=" + Date.now());
                const b = await r.arrayBuffer();
                
                // Настройка Mammoth для разделения абзацев
                const options = { styleMap: [ "p => p:fresh" ] };
                const res = await mammoth.convertToHtml({arrayBuffer: b}, options);
                
                content.innerHTML = res.value || "Файл пуст";
            } catch { content.innerHTML = "Файл не найден"; }
            window.scrollTo(0, 0);
        }

        // Свайп назад
        let tx = 0;
        document.addEventListener('touchstart', e => tx = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            if (document.getElementById('doc-view').style.display === 'block') {
                if (e.changedTouches[0].clientX - tx > 130) showMenu();
            }
        });

        window.onload = () => {
            document.getElementById('my-id').innerText = "ID: " + devID;
            const k = localStorage.getItem('ttk_token');
            if (k && validate(k)) showMenu();
        };
    </script>
</body>
</html>
