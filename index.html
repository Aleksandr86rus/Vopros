<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ТТК Доступ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --text: #c9d1d9; 
            --accent: #58a6ff; 
            --border: #30363d; 
            --error: #ff7b72; 
        }
        
        * { 
            user-select: none; 
            -webkit-user-select: none; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Разрешаем выделение только там, где это нужно */
        input, .allow-select { 
            user-select: text !important; 
            -webkit-user-select: text !important; 
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 10px;
        }

        .container { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            width: 100%; 
            max-width: 500px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* Поля ввода и основные кнопки */
        input { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 14px; 
            width: 100%; 
            margin: 15px 0; 
            border-radius: 8px; 
            text-align: center; 
            font-size: 16px; 
            outline: none; 
        }
        input:focus { border-color: var(--accent); }

        .btn-main { 
            background: var(--accent); 
            color: #fff; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            font-size: 16px; 
        }

        /* Сетка меню */
        .menu-grid { 
            display: grid; 
            gap: 12px; 
            margin-top: 20px; 
        }

        .card-btn { 
            background: #21262d; 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 14px; 
            line-height: 1.4;
            transition: background 0.2s, transform 0.1s;
        }
        .card-btn:active { 
            background: #30363d; 
            transform: scale(0.98); 
        }
        .card-btn.special { 
            border-left: 4px solid var(--accent); 
            font-weight: 600;
            background: #1c2128;
        }

        /* Управление документом */
        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 12px; 
            margin-bottom: 15px; 
        }
        .btn-back { 
            background: transparent; 
            color: var(--accent); 
            border: 1px solid var(--accent); 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
        }

        #my-id { 
            margin-top: 20px; 
            font-family: monospace; 
            color: #8b949e; 
            cursor: pointer; 
            padding: 10px;
            display: inline-block;
            user-select: text !important;
        }

        /* Стили для контента из Word */
        #doc-data table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        #doc-data td, #doc-data th { border: 1px solid var(--border); padding: 8px; font-size: 14px; }
        #doc-data img { max-width: 100%; height: auto; border-radius: 4px; }

        #menu-screen, #doc-screen { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-screen" class="container">
        <h2 style="color:var(--accent); margin-top:0;">Доступ</h2>
        <input type="text" id="pass-input" placeholder="Введите ключ">
        <button class="btn-main" onclick="checkAccess()">ОТКРЫТЬ</button>
        <div id="my-id" onclick="copyID()">ID: ЗАГРУЗКА...</div>
    </div>

    <div id="menu-screen" class="container">
        <h3 style="margin-top:0; color:var(--accent);">Главное меню</h3>
        <div class="menu-grid">
            <button class="card-btn special" onclick="openDocument('вопросы.docx', 'Трудовые отношения')">
                📄 При выполнении трудовых отношений оператор руководствуется...
            </button>
            <div id="tickets-list" class="menu-grid" style="margin:0; padding:0;">
                </div>
        </div>
    </div>

    <div id="doc-screen" class="container" style="text-align: left;">
        <div class="controls">
            <button class="btn-back" onclick="showMenu()">← НАЗАД</button>
            <span id="current-doc-title" style="font-size: 0.75rem; color: var(--accent); text-transform: uppercase;"></span>
        </div>
        <div id="doc-data" class="allow-select">Загрузка...</div>
    </div>

    <script>
        const SECRET = "TTK_PRO_2026";

        // Генерация кнопок билетов
        const ticketsList = document.getElementById('tickets-list');
        for (let i = 1; i <= 11; i++) {
            ticketsList.innerHTML += `
                <button class="card-btn" onclick="openDocument('билет№${i}.docx', 'Экзамен: Билет №${i}')">
                    🎫 Билет №${i}
                </button>`;
        }

        // Работа с Device ID
        function getDeviceID() {
            let id = localStorage.getItem('ttk_dev_id_v2');
            if (!id) {
                id = `TTK-${Math.random().toString(36).substring(2, 8).toUpperCase()}`;
                localStorage.setItem('ttk_dev_id_v2', id);
            }
            return id;
        }
        const deviceID = getDeviceID();
        document.getElementById('my-id').innerText = "ID: " + deviceID;

        // Копирование (исправлено)
        async function copyID() {
            const el = document.getElementById('my-id');
            const textToCopy = deviceID;
            
            try {
                await navigator.clipboard.writeText(textToCopy);
                el.innerText = "СКОПИРОВАНО!";
                el.style.color = "var(--accent)";
            } catch (err) {
                // Резервный метод
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                el.innerText = "СКОПИРОВАНО!";
            }
            
            setTimeout(() => { 
                el.innerText = "ID: " + deviceID; 
                el.style.color = "#8b949e";
            }, 1000);
        }

        // Проверка доступа
        function validateKey(pass) {
            try {
                const timeHex = pass.substring(0, 8);
                const expiryMs = parseInt(timeHex, 16) * 1000;
                const checkHash = btoa(deviceID + expiryMs + SECRET).substring(0, 6).toUpperCase();
                return (pass.substring(8) === checkHash && Date.now() < expiryMs);
            } catch(e) { return false; }
        }

        function checkAccess() {
            const pass = document.getElementById('pass-input').value.trim().toUpperCase();
            if (validateKey(pass)) {
                localStorage.setItem('ttk_token', pass);
                showMenu();
            } else { 
                alert("Неверный ключ или срок действия истек"); 
            }
        }

        // Навигация
        function showMenu() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('doc-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
            window.scrollTo(0, 0);
        }

        async function openDocument(file, title) {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('doc-screen').style.display = 'block';
            document.getElementById('current-doc-title').innerText = title;
            
            const display = document.getElementById('doc-data');
            display.innerHTML = "<i>Загрузка контента...</i>";

            try {
                const res = await fetch(file + "?v=" + Date.now());
                if (!res.ok) throw new Error();
                const arrayBuffer = await res.arrayBuffer();
                const result = await mammoth.convertToHtml({arrayBuffer: arrayBuffer});
                display.innerHTML = result.value || "Файл пуст";
                window.scrollTo(0, 0);
            } catch (e) {
                display.innerHTML = `<p style="color:var(--error)">Ошибка: Файл <b>${file}</b> не найден в корневой папке сайта.</p>`;
            }
        }

        // Авто-вход
        window.onload = () => {
            const savedKey = localStorage.getItem('ttk_token');
            if (savedKey && validateKey(savedKey)) showMenu();
        };
    </script>
</body>
</html>
