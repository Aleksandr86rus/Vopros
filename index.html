<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TTK Premium Access</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --glass: rgba(22, 27, 34, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #e6edf3; 
            --accent: #58a6ff; 
            --accent-glow: rgba(88, 166, 255, 0.3);
            --secondary: #8b949e;
        }
        
        * { 
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        .bg-glow {
            position: fixed;
            width: 300px; height: 300px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
            animation: move 15s infinite alternate;
        }
        @keyframes move {
            from { top: -50px; left: -50px; }
            to { bottom: -50px; right: -50px; }
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 24px;
            z-index: 1;
        }

        /* Эффект стекла для карточек */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2, h3 { font-weight: 700; letter-spacing: -0.5px; margin-bottom: 20px; text-align: center; }

        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: #fff;
            padding: 16px;
            width: 100%;
            margin-bottom: 16px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .btn-main {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        /* Стили меню */
        .menu-grid { display: grid; gap: 12px; margin-top: 10px; }
        .card-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }
        .card-item:active { background: rgba(255, 255, 255, 0.08); transform: translateX(5px); }
        .card-item span { font-size: 15px; line-height: 1.4; }
        .card-item i { margin-right: 12px; font-style: normal; opacity: 0.8; }

        .special-item {
            background: linear-gradient(135deg, rgba(88,166,255,0.1) 0%, rgba(88,166,255,0.05) 100%);
            border-left: 3px solid var(--accent);
        }

        /* Плавающая кнопка назад */
        .fab {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 30px;
            color: var(--accent);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            z-index: 100;
            display: none;
        }

        /* Контент документа */
        #doc-view { display: none; width: 100%; max-width: 650px; padding: 20px 20px 100px 20px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #doc-data { line-height: 1.6; color: #d1d5db; font-size: 16px; }
        #doc-data table { width: 100%; border-collapse: collapse; margin: 20px 0; background: rgba(0,0,0,0.2); border-radius: 12px; overflow: hidden; }
        #doc-data td { border: 1px solid var(--glass-border); padding: 12px; font-size: 14px; }
        
        #my-id { margin-top: 25px; font-size: 11px; color: var(--secondary); letter-spacing: 1px; cursor: pointer; text-align: center; text-transform: uppercase; }
        
        .allow-select { user-select: text !important; -webkit-user-select: text !important; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="bg-glow"></div>

    <div id="screen-login" class="container">
        <div class="glass-card" style="margin-top: 100px;">
            <h2 style="margin-bottom: 5px;">TTK Access</h2>
            <p style="text-align: center; color: var(--secondary); font-size: 14px; margin-bottom: 25px;">Введите ключ доступа</p>
            <input type="text" id="pass-input" placeholder="•••• •••• ••••">
            <button class="btn-main" onclick="checkAccess()">Войти</button>
            <div id="my-id" onclick="copyID()">Загрузка ID...</div>
        </div>
    </div>

    <div id="screen-menu" class="container" style="display: none;">
        <h3 style="text-align: left; padding-left: 10px; color: var(--accent);">База знаний</h3>
        <div class="menu-grid">
            <div class="card-item special-item" onclick="openDoc('вопросы.docx', 'Инструкция')">
                <i>📄</i> <span>Трудовые отношения и обязанности оператора</span>
            </div>
            <div id="tickets-container" class="menu-grid"></div>
        </div>
    </div>

    <div id="screen-doc">
        <div id="doc-view">
            <h3 id="doc-header" style="text-align: left; color: var(--accent); border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 20px;"></h3>
            <div id="doc-data" class="allow-select glass-card"></div>
        </div>
        <button class="fab" onclick="showMenu()">← Назад в меню</button>
    </div>

    <script>
        const SECRET = "TTK_PRO_2026";
        const devID = getID();

        // Рендер билетов
        const container = document.getElementById('tickets-container');
        for (let i = 1; i <= 11; i++) {
            container.innerHTML += `
                <div class="card-item" onclick="openDoc('билет№${i}.docx', 'Билет №${i}')">
                    <i>🎫</i> <span>Билет экзаменационный №${i}</span>
                </div>`;
        }

        // Жесты
        let startX = 0;
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            if (document.getElementById('doc-view').style.display === 'block') {
                if (e.changedTouches[0].clientX - startX > 100) showMenu();
            }
        });

        function getID() {
            let id = localStorage.getItem('ttk_id_v3') || `TTK-${Math.random().toString(36).substring(2,8).toUpperCase()}`;
            localStorage.setItem('ttk_id_v3', id);
            return id;
        }

        async function copyID() {
            try { await navigator.clipboard.writeText(devID); } 
            catch {
                const t = document.createElement("textarea"); t.value = devID;
                document.body.appendChild(t); t.select(); document.execCommand('copy');
                document.body.removeChild(t);
            }
            const el = document.getElementById('my-id');
            el.innerText = "Скопировано!";
            el.style.color = "var(--accent)";
            setTimeout(() => { el.innerText = "ID: " + devID; el.style.color = "var(--secondary)"; }, 1000);
        }

        function validate(pass) {
            try {
                const t = parseInt(pass.substring(0, 8), 16) * 1000;
                const h = btoa(devID + t + SECRET).substring(0, 6).toUpperCase();
                return (pass.substring(8) === h && Date.now() < t);
            } catch { return false; }
        }

        function checkAccess() {
            const val = document.getElementById('pass-input').value.trim().toUpperCase();
            if (validate(val)) {
                localStorage.setItem('ttk_key', val);
                showMenu();
            } else { alert("Доступ отклонен"); }
        }

        function showMenu() {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('doc-view').style.display = 'none';
            document.querySelector('.fab').style.display = 'none';
            document.getElementById('screen-menu').style.display = 'block';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function openDoc(file, title) {
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('doc-view').style.display = 'block';
            document.querySelector('.fab').style.display = 'flex';
            document.getElementById('doc-header').innerText = title;
            const content = document.getElementById('doc-data');
            content.innerHTML = "Загрузка данных...";

            try {
                const r = await fetch(file + "?v=" + Date.now());
                const b = await r.arrayBuffer();
                const res = await mammoth.convertToHtml({arrayBuffer: b});
                content.innerHTML = res.value || "Файл пуст";
            } catch { content.innerHTML = "Ошибка загрузки файла"; }
            window.scrollTo(0, 0);
        }

        window.onload = () => {
            document.getElementById('my-id').innerText = "ID: " + devID;
            const k = localStorage.getItem('ttk_key');
            if (k && validate(k)) showMenu();
        };
    </script>
</body>
</html>
